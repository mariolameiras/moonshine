name: Release Flatpak

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  APP_ID: dev.lizardbyte.app.Moonshine
  FLATPAK_RUNTIME: "24.08"

permissions:
  contents: write

jobs:
  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Flatpak dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y flatpak
        flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
        flatpak install -y flathub \
          org.freedesktop.Platform//${FLATPAK_RUNTIME} \
          org.freedesktop.Sdk//${FLATPAK_RUNTIME} \
          org.freedesktop.Sdk.Extension.rust-stable//${FLATPAK_RUNTIME}

    - name: Cache Flatpak build
      uses: actions/cache@v4
      with:
        path: ~/.local/share/flatpak/repo
        key: flatpak-repo-${{ github.sha }}
        restore-keys: flatpak-repo-

    - name: Build Flatpak
      run: |
        flatpak-builder \
          --force-clean \
          --repo=repo \
          --install-deps-from=flathub \
          --user \
          build-dir \
          packaging/flatpak/${APP_ID}.yml

    - name: Create Flatpak bundle
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        flatpak build-bundle \
          --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo \
          repo \
          Moonshine-${VERSION}.x86_64.flatpak \
          ${APP_ID}

    - name: Upload Flatpak
      uses: softprops/action-gh-release@v2
      with:
        files: "Moonshine-*.flatpak"
