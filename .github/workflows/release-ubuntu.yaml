name: Release Ubuntu

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-deb:
    name: Build .deb
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential clang cmake \
          libc++-dev libevdev-dev libgbm-dev libglib2.0-dev \
          libopus-dev libpulse-dev libshaderc-dev libvulkan-dev \
          libwayland-dev libxkbcommon-dev \
          pkg-config

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Build .deb
      run: VER="${{ github.ref_name }}"; ./packaging/deb/build.sh "${VER#v}"

    - name: Upload .deb
      uses: softprops/action-gh-release@v2
      with:
        files: "moonshine_*.deb"

  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential clang cmake \
          libc++-dev libevdev-dev libgbm-dev libglib2.0-dev \
          libopus-dev libpulse-dev libshaderc-dev libvulkan-dev \
          libwayland-dev libxkbcommon-dev \
          pkg-config

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Build AppImage
      run: VER="${{ github.ref_name }}"; ./packaging/appimage/build.sh "${VER#v}"

    - name: Upload AppImage
      uses: softprops/action-gh-release@v2
      with:
        files: "Moonshine-*.AppImage"
